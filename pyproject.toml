[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F"]
ignore = [
    "E402",  # module-level imports after eventlet.monkey_patch() are required, not a bug
    "E501",  # line length is a formatting nit, not correctness — not blocking yet
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "silent"
# Story 5.3a: staged adoption. Type hints are being added incrementally
# (see Story 6.4b); this config exists so `mypy` has a home once hints
# land, without requiring the whole codebase to be typed today.
check_untyped_defs = false
disallow_untyped_defs = false
