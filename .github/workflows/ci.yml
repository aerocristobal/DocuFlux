name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'
        cache-dependency-path: |
          web/requirements.txt
          worker/requirements.txt
          tests/requirements.txt

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc libmagic1 libmagic1t64 || sudo apt-get install -y pandoc libmagic1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r web/requirements.txt
        pip install -r worker/requirements.txt
        pip install -r tests/requirements.txt

    - name: Run Tests with Coverage
      env:
        FLASK_ENV: testing
        REDIS_METADATA_URL: redis://localhost:6379/1
        CELERY_BROKER_URL: redis://localhost:6379/0
        CELERY_RESULT_BACKEND: redis://localhost:6379/0
        SECRET_KEY: testing-key
      run: |
        pytest --cov=web --cov=worker --cov-report=xml --cov-report=term-missing --cov-config=.coveragerc

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

  extension-deps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: extension-src/package-lock.json

    - name: Install extension dependencies
      run: npm ci
      working-directory: extension-src

    - name: Check for outdated dependencies
      run: |
        npm outdated --json > /tmp/outdated.json 2>/dev/null || true
        node -e "
          const fs = require('fs');
          const raw = fs.readFileSync('/tmp/outdated.json', 'utf8').trim();
          if (!raw || raw === '{}') { console.log('All dependencies up to date'); process.exit(0); }
          const d = JSON.parse(raw);
          for (const [name, info] of Object.entries(d)) {
            const [cMaj, cMin] = info.current.split('.');
            const [lMaj, lMin] = info.latest.split('.');
            if (Number(lMaj) > Number(cMaj) || Number(lMin) - Number(cMin) > 2)
              console.log('::warning::' + name + ' is outdated: ' + info.current + ' -> ' + info.latest);
          }
        "
      working-directory: extension-src

  extension-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: extension-src/package-lock.json

    - name: Install extension dependencies
      run: npm ci
      working-directory: extension-src

    - name: Run extension tests with coverage
      run: npx vitest run --coverage
      working-directory: extension-src
